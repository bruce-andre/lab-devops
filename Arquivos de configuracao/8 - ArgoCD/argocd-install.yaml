apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-managed
  namespace: argocd
spec:
  project: default
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm  
    targetRevision: 6.7.* 
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd                              
  syncPolicy:
    automated:
      prune: true
      selfHeal: true