apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: porteiro-ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.0
    helm:
      values: |
        controller:
          # Define o NGINX como o roteador padrão do seu cluster
          ingressClassResource:
            default: true
          # Como estamos em um lab local usando port-forward, não precisamos de um LoadBalancer pago de nuvem
          service:
            type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true